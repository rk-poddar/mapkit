name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Typecheck
        run: pnpm typecheck

      - name: Build workspace
        run: pnpm -r build

  examples:
    name: Example build / ${{ matrix.example }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        include:
          - example: next-basic
            adapter: leaflet
            package: "@map-kit/example-next-basic"
          - example: next-maplibre
            adapter: maplibre
            package: "@map-kit/example-next-maplibre"
          - example: next-mapbox
            adapter: mapbox
            package: "@map-kit/example-next-mapbox"
          - example: next-google-maps
            adapter: google-maps
            package: "@map-kit/example-next-google-maps"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build package dependencies
        run: pnpm --filter @map-kit/core --filter @map-kit/react --filter @map-kit/${{ matrix.adapter }} build

      - name: Build example
        run: pnpm --filter ${{ matrix.package }} build

  e2e:
    name: Browser runtime smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Build workspace
        run: pnpm -r build

      - name: Run browser smoke tests
        run: pnpm test:e2e
